server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + SSE streaming → FastAPI backend. The backend's own routes are
    # already prefixed with /api, so the path is passed through unchanged.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events: disable buffering so tokens stream in real time.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }
}
